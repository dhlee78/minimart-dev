name: QA

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Health smoke test
        run: |
          node server.js &
          sleep 2
          curl -f http://localhost:3000/api/health
