<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MiniMarket API Test</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div style="max-width:1240px;margin:0 auto;padding:24px">
    <h1 style="margin:0 0 12px 0;font-size:20px;font-weight:700;letter-spacing:-0.01em;">API Test</h1>
    <p style="margin:0 0 16px 0;color:#4B5563;">이 페이지는 HOME UI를 건드리지 않고 API 렌더링 실험을 하기 위한 테스트 페이지입니다.</p>
    <div id="api-test-root"></div>
  </div>

  <script type="module">
import { parseQuery, getState, setState } from './js/core/state.js';
import { showToast } from './js/core/toast.js';
import { apiFetch } from './js/api/client.js';

parseQuery();

async function loadProducts() {
  const state = getState();
  try {
    const data = await apiFetch(`/products?page=${state.page}&sort=${state.sort}`);
    renderProducts(data.items || []);
  } catch (e) {
    console.error(e);
  }
}

function renderProducts(items) {
  const container = document.querySelector('#api-test-root');
  if (!container) return;

  container.innerHTML = '';
  if (!items.length) {
    container.innerHTML = '<p>상품이 없습니다.</p>';
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.style.border = '1px solid #ddd';
    div.style.padding = '10px';
    div.style.marginBottom = '10px';
    div.innerHTML = `
      <strong>${item.name}</strong><br/>
      가격: ${item.price}<br/>
      <button data-id="${item.id}">장바구니 담기</button>
    `;
    container.appendChild(div);
  });

  container.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', async () => {
      const productId = btn.dataset.id;
      try {
        await apiFetch('/cart', {
          method: 'POST',
          body: JSON.stringify({
            productId,
            optionId: null,
            quantity: 1
          })
        });
        showToast('장바구니에 담았습니다.');
      } catch (e) {
        console.error(e);
      }
    });
  });
}

document.getElementById('sortPriceAsc')?.addEventListener('click', () => {
  setState({ sort: 'price-asc', page: 1 });
});

document.getElementById('sortPriceDesc')?.addEventListener('click', () => {
  setState({ sort: 'price-desc', page: 1 });
});

document.getElementById('nextPage')?.addEventListener('click', () => {
  const state = getState();
  setState({ page: Number(state.page) + 1 });
});

window.addEventListener('statechange', () => {
  loadProducts();
  const el = document.querySelector('#api-test-root');
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

loadProducts();
</script>
</body>
</html>
