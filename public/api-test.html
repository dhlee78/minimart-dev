<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MiniMart API Test</title>
  <style>
    body{font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:24px; line-height:1.4}
    .row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px}
    button{padding:10px 14px; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer}
    pre{background:#0b1020; color:#e5e7eb; padding:14px; border-radius:12px; overflow:auto; max-height:60vh}
    input{padding:10px 12px; border-radius:10px; border:1px solid #ddd; min-width:260px}
  </style>
</head>
<body>
  <h1>MiniMart API Test</h1>
  <p>QA용: 버튼을 누르면 실제 <code>/api/*</code> 요청이 발생합니다. DevTools → Network(Fetch/XHR) 확인.</p>

  <div class="row">
    <button id="health">GET /api/health</button>
    <button id="products">GET /api/products</button>
    <button id="me">GET /api/me</button>
    <button id="cart">GET /api/cart</button>
  </div>

  <div class="row">
    <input id="email" placeholder="email" value="test@example.com"/>
    <input id="pw" placeholder="password" value="password123" type="password"/>
    <button id="login">POST /api/auth/login</button>
    <button id="logout">POST /api/auth/logout</button>
  </div>

  <pre id="out">{}</pre>

<script>
const out = document.getElementById('out');
let token = null;

async function req(path, opts={}){
  const headers = Object.assign({Accept:'application/json','X-Request-Id': (crypto.randomUUID?crypto.randomUUID():Date.now()+'' )}, opts.headers||{});
  if(token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(path, Object.assign({}, opts, {headers}));
  const data = await res.json().catch(()=>({}));
  out.textContent = JSON.stringify({ status: res.status, headers: Object.fromEntries(res.headers.entries()), data }, null, 2);
  return {res, data};
}

document.getElementById('health').onclick = ()=>req('/api/health');
document.getElementById('products').onclick = ()=>req('/api/products');
document.getElementById('me').onclick = ()=>req('/api/me');
document.getElementById('cart').onclick = ()=>req('/api/cart');

document.getElementById('login').onclick = async ()=>{
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('pw').value;
  const {data} = await req('/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password})});
  if(data && data.token) token = data.token;
};

document.getElementById('logout').onclick = async ()=>{
  await req('/api/auth/logout', {method:'POST'});
  token = null;
};
</script>
</body>
</html>
