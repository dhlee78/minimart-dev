<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MiniMarket | 주문/결제</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="home">
  
<div class="topbar">
  <div class="top-inner">
    <a class="logo" href="index.html" aria-label="home">
      <span class="mark">M</span>
      <span>MiniMarket</span>
    </a>

    <button class="catbtn" data-open-menu type="button" aria-haspopup="dialog">☰ 전체 카테고리</button>

    <div class="search-wrap">
      <div class="search" role="search">
        <span style="color:#9ca3af">🔎</span>
        <input data-search type="search" placeholder="상품을 검색하세요" aria-label="search" />
        <span class="hint">Ctrl K</span>
      </div>
      <div class="autocomplete" data-autocomplete role="listbox" aria-label="autocomplete"></div>
    </div>

    <div class="actions">
      <a class="action" href="wishlist.html">찜</a>
      <a class="action" href="orders.html">주문내역</a>
      <a class="action" href="login.html">로그인</a>
      <button class="action" data-logout type="button">로그아웃</button>

<script>
(() => {
  try {
    const a = JSON.parse(localStorage.getItem("minimart_auth") || "null");
    const authed = !!(a && (a.token || a.email));
    // Login (default visible)
    document.querySelectorAll('a.action[href="login.html"]').forEach(el => {
      el.style.display = authed ? "none" : "";
    });
    // Logout (may be hidden by CSS by default)
    document.querySelectorAll('[data-logout]').forEach(el => {
      el.style.display = authed ? "inline-flex" : "none";
    });
  } catch (e) {
    document.querySelectorAll('a.action[href="login.html"]').forEach(el => el.style.display = "");
    document.querySelectorAll('[data-logout]').forEach(el => el.style.display = "none");
  }
})();
</script>
      <a class="action" href="cart.html" style="background:rgba(255,255,255,.22)">
        장바구니 <span class="cartbadge" data-cart-badge>0</span>
      </a>
    </div>
  </div>
</div>

<div class="overlay" data-overlay aria-hidden="true">
  <div class="dialog megamenu" data-dialog role="dialog" aria-modal="true" aria-label="category menu">
    <div class="mm-left" data-mm-left></div>
    <div class="mm-right" data-mm-right></div>
  </div>
</div>

<div class="overlay" data-modal-overlay aria-hidden="true">
  <div class="dialog modal" data-modal-dialog role="dialog" aria-modal="true" aria-label="options modal"></div>
</div>

<div class="toast" role="status" aria-live="polite"></div>

  <div class="container" data-checkout-page>
    <div class="main" style="grid-template-columns:1fr 380px">
      <div class="detail-card detail-pad">
        <div style="font-weight:950;font-size:18px">주문/결제</div>
        <div style="margin-top:14px;border-top:1px solid #edf2f7;padding-top:14px">
          <div style="font-weight:950;font-size:16px">배송지</div>
          <div class="field"><label>받는사람</label><input data-addr-recipient data-testid="addr-recipient" placeholder="홍길동"></div>
          <div class="field"><label>연락처</label><input data-addr-phone data-testid="addr-phone" placeholder="010-0000-0000"></div>
          <div class="field"><label>우편번호</label><input data-addr-zip data-testid="addr-zip" placeholder="12345"></div>
          <div class="field"><label>기본주소</label><input data-addr-line1 data-testid="addr-line1" placeholder="서울시 ..."></div>
          <div class="field"><label>상세주소</label><input data-addr-line2 data-testid="addr-line2" placeholder="상세 주소"></div>
        </div>

        <div style="margin-top:14px;border-top:1px solid #edf2f7;padding-top:14px">
          <div style="font-weight:950;font-size:16px">결제/할인</div>
          <div class="field">
            <label>결제수단</label>
            <select data-pay-method data-testid="pay-method">
              <option value="card">카드</option>
              <option value="vbank">가상계좌</option>
              <option value="cod">착불</option>
            </select>
          </div>
          <div class="field"><label>카드 끝 4자리</label><input data-card-last4 data-testid="card-last4" placeholder="0000"></div>
          <div class="field"><label>쿠폰코드</label><input data-coupon data-testid="coupon" placeholder="예: WELCOME10"></div>
          <div class="field"><label>포인트 사용</label><input data-points data-testid="points" value="0"></div>
          <div class="field"><label>배송메모</label><input data-memo data-testid="memo" placeholder="문 앞에 놓아주세요"></div>
          <div style="margin-top:8px;color:#6b7280;font-size:12px">
            * 서버에서 재고/쿠폰/포인트 검증(400/409) → QA 케이스 만들기 좋음
          </div>
        </div>
<button class="btn primary" data-pay type="button" style="width:100%;justify-content:center">결제하기</button>
      </div>
      <div class="summary">
        <div style="font-weight:950;margin-bottom:10px">주문 상품</div>
        <div data-checkout-lines></div>
      </div>
    </div>
    <div class="footer">결제 성공 시 주문완료로 이동</div>
  </div>
  
<div class="bnav">
  <div class="bnav-inner">
    <a href="index.html" data-page="home">🏠<span>홈</span></a>
    <a href="index.html#products" data-page="search">🔎<span>검색</span></a>
    <a href="cart.html" data-page="cart">🛒<span>장바구니</span></a>
    <a href="orders.html" data-page="orders">📦<span>주문</span></a>
  </div>
</div>

  <script src="app.js"></script>
</body>
</html>
